name: Codex CI

on:
  push:
    branches:
      - main
      - "thehive/**"
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Codex checks
        run: pnpm codex:check

      - name: Run examples smoke with JSON summaries
        run: pnpm examples:smoke -- --json-summary

      - name: Upload examples smoke summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: examples-smoke-summaries
          path: examples/dist/smoke-summaries/*.json
          if-no-files-found: error

      - name: Pack example archives
        run: pnpm codex:pack
