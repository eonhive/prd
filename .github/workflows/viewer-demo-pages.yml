name: Viewer Demo Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/viewer-demo-pages.yml"
      - "apps/prd-viewer-web/**"
      - "examples/**"
      - "packages/**"
      - "scripts/prepare-viewer-demo-assets.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: viewer-demo-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build hosted viewer demo
        run: pnpm viewer:demo:build
        env:
          PRD_VIEWER_BASE_PATH: /prd/

      - name: Add GitHub Pages SPA fallback
        run: cp apps/prd-viewer-web/dist/index.html apps/prd-viewer-web/dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/prd-viewer-web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
